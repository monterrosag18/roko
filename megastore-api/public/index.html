<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
        h1 { margin-bottom: 15px; }
        nav { margin-bottom: 20px; }
        nav button { padding: 8px 16px; margin-right: 5px; cursor: pointer; border: 1px solid #ccc; background: #fff; }
        nav button.active { background: #333; color: #fff; border-color: #333; }
        table { width: 100%; border-collapse: collapse; background: #fff; margin-top: 10px; }
        th, td { padding: 10px 12px; border: 1px solid #ddd; text-align: left; font-size: 14px; }
        th { background: #333; color: #fff; }
        .actions button { margin-right: 4px; padding: 4px 10px; cursor: pointer; font-size: 13px; }
        .btn-edit { background: #2196F3; color: #fff; border: none; }
        .btn-del { background: #f44336; color: #fff; border: none; }
        .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 5px; }
        .toolbar h2 { font-size: 18px; }
        .btn-add { padding: 6px 14px; background: #4CAF50; color: #fff; border: none; cursor: pointer; font-size: 13px; }
        .overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); justify-content:center; align-items:center; z-index:10; }
        .overlay.show { display:flex; }
        .modal { background:#fff; padding:24px; width:380px; max-width:90vw; border-radius:6px; }
        .modal h3 { margin-bottom:14px; }
        .modal label { display:block; margin-bottom:3px; font-size:13px; color:#555; }
        .modal input, .modal select { width:100%; padding:7px; margin-bottom:10px; border:1px solid #ccc; font-size:14px; }
        .modal-btns { display:flex; gap:8px; margin-top:8px; }
        .modal-btns button { flex:1; padding:8px; border:none; cursor:pointer; font-size:14px; }
        .modal-btns .save { background:#4CAF50; color:#fff; }
        .modal-btns .cancel { background:#ccc; }
    </style>
</head>
<body>

<h1>MegaStore</h1>
<nav>
    <button class="active" onclick="show('products',this)">Products</button>
    <button onclick="show('categories',this)">Categories</button>
    <button onclick="show('suppliers',this)">Suppliers</button>
    <button onclick="show('customers',this)">Customers</button>
</nav>
<div id="content">Loading...</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <h3 id="modalTitle"></h3>
        <form id="modalForm"></form>
    </div>
</div>

<script>
let section = 'products';
let cats = [], sups = [];

async function api(path, opts) {
    const r = await fetch(path, opts);
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.statusText);
    return r.json();
}

function show(s, btn) {
    section = s;
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    load();
}

async function load() {
    const el = document.getElementById('content');
    try {
        const data = await api('/api/' + section);
        if (section === 'products') {
            cats = await api('/api/categories');
            sups = await api('/api/suppliers');
            el.innerHTML = toolbar('Products') + `<table>
                <tr><th>ID</th><th>SKU</th><th>Name</th><th>Price</th><th>Category</th><th>Supplier</th><th>Actions</th></tr>
                ${data.map(p => `<tr><td>${p.id}</td><td>${p.sku}</td><td>${p.name}</td><td>$${Number(p.price).toLocaleString()}</td><td>${p.category_name}</td><td>${p.supplier_name}</td><td class="actions">
                    <button class="btn-edit" onclick='editProduct(${JSON.stringify(p)})'>Edit</button>
                    <button class="btn-del" onclick="remove(${p.id})">Delete</button></td></tr>`).join('')}</table>`;
        } else if (section === 'categories') {
            cats = data;
            el.innerHTML = toolbar('Categories') + `<table><tr><th>ID</th><th>Name</th><th>Actions</th></tr>
                ${data.map(c => `<tr><td>${c.id}</td><td>${c.name}</td><td class="actions">
                    <button class="btn-edit" onclick='editSimple(${JSON.stringify(c)},["name"])'>Edit</button>
                    <button class="btn-del" onclick="remove(${c.id})">Delete</button></td></tr>`).join('')}</table>`;
        } else if (section === 'suppliers') {
            sups = data;
            el.innerHTML = toolbar('Suppliers') + `<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Actions</th></tr>
                ${data.map(s => `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.email}</td><td class="actions">
                    <button class="btn-edit" onclick='editSimple(${JSON.stringify(s)},["name","email"])'>Edit</button>
                    <button class="btn-del" onclick="remove(${s.id})">Delete</button></td></tr>`).join('')}</table>`;
        } else {
            el.innerHTML = toolbar('Customers') + `<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Address</th><th>Phone</th><th>Actions</th></tr>
                ${data.map(c => `<tr><td>${c.id}</td><td>${c.full_name}</td><td>${c.email}</td><td>${c.address||'-'}</td><td>${c.phone||'-'}</td><td class="actions">
                    <button class="btn-edit" onclick='editSimple(${JSON.stringify(c)},["full_name","email","address","phone"])'>Edit</button>
                    <button class="btn-del" onclick="remove(${c.id})">Delete</button></td></tr>`).join('')}</table>`;
        }
    } catch(e) { el.innerHTML = 'Error: ' + e.message; }
}

function toolbar(title) {
    return `<div class="toolbar"><h2>${title}</h2><button class="btn-add" onclick="add()">+ Add</button></div>`;
}

function add() {
    if (section === 'products') return editProduct();
    const fields = section === 'categories' ? ['name'] : section === 'suppliers' ? ['name','email'] : ['full_name','email','address','phone'];
    editSimple(null, fields);
}

function editProduct(p) {
    const edit = !!p;
    document.getElementById('modalTitle').textContent = edit ? 'Edit Product' : 'New Product';
    document.getElementById('modalForm').innerHTML = `
        <label>SKU</label><input name="sku" value="${p?.sku||''}" required>
        <label>Name</label><input name="name" value="${p?.name||''}" required>
        <label>Price</label><input name="price" type="number" value="${p?.price||''}" required>
        <label>Category</label><select name="category_id">${cats.map(c=>`<option value="${c.id}" ${p?.category_id==c.id?'selected':''}>${c.name}</option>`).join('')}</select>
        <label>Supplier</label><select name="supplier_id">${sups.map(s=>`<option value="${s.id}" ${p?.supplier_id==s.id?'selected':''}>${s.name}</option>`).join('')}</select>
        <div class="modal-btns"><button type="button" class="cancel" onclick="close_()">Cancel</button><button type="submit" class="save">${edit?'Update':'Create'}</button></div>`;
    document.getElementById('modalForm').onsubmit = async(e)=>{
        e.preventDefault();
        const fd = Object.fromEntries(new FormData(e.target));
        fd.price=parseFloat(fd.price); fd.category_id=parseInt(fd.category_id); fd.supplier_id=parseInt(fd.supplier_id);
        await api(edit?`/api/products/${p.id}`:'/api/products',{method:edit?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(fd)});
        close_(); load();
    };
    document.getElementById('overlay').classList.add('show');
}

function editSimple(existing, fields) {
    const edit = !!existing;
    document.getElementById('modalTitle').textContent = (edit?'Edit':'New') + ' ' + section.slice(0,-1);
    document.getElementById('modalForm').innerHTML = `
        ${fields.map(f=>`<label>${f}</label><input name="${f}" value="${existing?.[f]||''}">`).join('')}
        <div class="modal-btns"><button type="button" class="cancel" onclick="close_()">Cancel</button><button type="submit" class="save">${edit?'Update':'Create'}</button></div>`;
    document.getElementById('modalForm').onsubmit = async(e)=>{
        e.preventDefault();
        const fd = Object.fromEntries(new FormData(e.target));
        await api(edit?`/api/${section}/${existing.id}`:`/api/${section}`,{method:edit?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(fd)});
        close_(); load();
    };
    document.getElementById('overlay').classList.add('show');
}

async function remove(id) {
    if (!confirm('Delete this record?')) return;
    await api(`/api/${section}/${id}`, {method:'DELETE'});
    load();
}

function close_() { document.getElementById('overlay').classList.remove('show'); }

load();
</script>
</body>
</html>
