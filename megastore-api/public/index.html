<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaStore Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }

        nav {
            background: #1a1a2e; padding: 16px 32px;
            display: flex; align-items: center; gap: 32px;
            border-bottom: 2px solid #16213e;
        }
        nav h1 { font-size: 1.4rem; color: #e94560; }
        nav button {
            background: none; border: 1px solid #333; color: #aaa;
            padding: 8px 18px; border-radius: 6px; cursor: pointer;
            font-size: .9rem; transition: all .2s;
        }
        nav button:hover, nav button.active {
            background: #e94560; color: #fff; border-color: #e94560;
        }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        .section-title {
            font-size: 1.1rem; margin-bottom: 14px; color: #e94560;
            display: flex; align-items: center; gap: 10px;
        }
        .count-badge {
            background: #1a1a2e; padding: 2px 10px; border-radius: 12px;
            font-size: .8rem; color: #888;
        }

        table {
            width: 100%; border-collapse: collapse;
            background: #1a1a2e; border-radius: 10px; overflow: hidden;
        }
        th {
            background: #16213e; padding: 12px 16px;
            text-align: left; font-size: .8rem;
            text-transform: uppercase; letter-spacing: .5px; color: #888;
        }
        td {
            padding: 11px 16px; border-bottom: 1px solid #222;
            font-size: .9rem;
        }
        tr:hover td { background: rgba(233,69,96,.05); }
        tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 4px;
            font-size: .78rem; font-weight: 600;
        }
        .badge-elec { background: #1b3a4b; color: #4fc3f7; }
        .badge-acc  { background: #3b2e1a; color: #ffb74d; }
        .badge-home { background: #1b3b2f; color: #81c784; }
        .badge-stat { background: #3b1b3b; color: #ce93d8; }
        .badge-kit  { background: #3b341b; color: #fff176; }
        .badge-default { background: #2a2a2a; color: #aaa; }

        .price { color: #4fc3f7; font-weight: 600; }
        .sku { color: #888; font-family: monospace; font-size: .85rem; }
        .email { color: #999; font-size: .85rem; }

        .loading { text-align: center; padding: 60px; color: #555; }
        .error { text-align: center; padding: 40px; color: #e94560; }

        /* Form styles */
        .form-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,.7); z-index: 100;
            justify-content: center; align-items: center;
        }
        .form-overlay.show { display: flex; }
        .form-box {
            background: #1a1a2e; padding: 28px; border-radius: 12px;
            width: 420px; max-width: 90vw;
        }
        .form-box h3 { margin-bottom: 18px; color: #e94560; }
        .form-box label { display: block; margin-bottom: 4px; font-size: .85rem; color: #888; }
        .form-box input, .form-box select {
            width: 100%; padding: 9px 12px; margin-bottom: 12px;
            background: #16213e; border: 1px solid #333; border-radius: 6px;
            color: #e0e0e0; font-size: .9rem;
        }
        .form-actions { display: flex; gap: 10px; margin-top: 6px; }
        .form-actions button {
            flex: 1; padding: 10px; border: none; border-radius: 6px;
            cursor: pointer; font-size: .9rem; font-weight: 600;
        }
        .btn-save { background: #e94560; color: #fff; }
        .btn-cancel { background: #333; color: #aaa; }
        .btn-save:hover { background: #c73652; }
        .btn-cancel:hover { background: #444; }

        .btn-add {
            background: #e94560; color: #fff; border: none;
            padding: 8px 18px; border-radius: 6px; cursor: pointer;
            font-size: .85rem; font-weight: 600;
        }
        .btn-add:hover { background: #c73652; }
        .btn-del {
            background: none; border: 1px solid #c0392b; color: #e74c3c;
            padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: .78rem;
        }
        .btn-del:hover { background: #c0392b; color: #fff; }
        .btn-edit {
            background: none; border: 1px solid #2980b9; color: #3498db;
            padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: .78rem;
        }
        .btn-edit:hover { background: #2980b9; color: #fff; }
    </style>
</head>
<body>

<nav>
    <h1>&#128722; MegaStore</h1>
    <button class="active" onclick="showSection('products')">Products</button>
    <button onclick="showSection('categories')">Categories</button>
    <button onclick="showSection('suppliers')">Suppliers</button>
    <button onclick="showSection('customers')">Customers</button>
</nav>

<div class="container">
    <div id="content"><div class="loading">Loading...</div></div>
</div>

<!-- Generic Form Modal -->
<div class="form-overlay" id="formOverlay">
    <div class="form-box">
        <h3 id="formTitle">Add</h3>
        <form id="genericForm"></form>
    </div>
</div>

<script>
const API = '';
let currentSection = 'products';
let categoriesCache = [];
let suppliersCache = [];

// ─── Helpers ────────────────────────────────
function fmt(n) {
    return new Intl.NumberFormat('es-CO', { style:'currency', currency:'COP', minimumFractionDigits:0 }).format(n);
}

function catBadge(name) {
    const map = { Electronics:'badge-elec', Accessories:'badge-acc', Home:'badge-home', Stationery:'badge-stat', Kitchen:'badge-kit' };
    return `<span class="badge ${map[name]||'badge-default'}">${name}</span>`;
}

async function api(path, opts) {
    const r = await fetch(API + path, opts);
    if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || r.statusText); }
    return r.json();
}

// ─── Section switching ──────────────────────
function showSection(s) {
    currentSection = s;
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    loadSection();
}

async function loadSection() {
    const el = document.getElementById('content');
    el.innerHTML = '<div class="loading">Loading...</div>';
    try {
        if (currentSection === 'products') await renderProducts(el);
        else if (currentSection === 'categories') await renderCategories(el);
        else if (currentSection === 'suppliers') await renderSuppliers(el);
        else if (currentSection === 'customers') await renderCustomers(el);
    } catch (err) {
        el.innerHTML = `<div class="error">Error: ${err.message}</div>`;
    }
}

// ─── Products ───────────────────────────────
async function renderProducts(el) {
    const [data] = await Promise.all([
        api('/api/products'),
        loadCaches()
    ]);
    el.innerHTML = `
        <div class="section-title">Products <span class="count-badge">${data.length}</span>
            <button class="btn-add" onclick="openProductForm()">+ Add</button>
        </div>
        <table>
            <tr><th>ID</th><th>SKU</th><th>Name</th><th>Price</th><th>Category</th><th>Supplier</th><th></th></tr>
            ${data.map(p => `<tr>
                <td>${p.id}</td>
                <td class="sku">${p.sku}</td>
                <td>${p.name}</td>
                <td class="price">${fmt(p.price)}</td>
                <td>${catBadge(p.category_name)}</td>
                <td>${p.supplier_name}</td>
                <td>
                    <button class="btn-edit" onclick='openProductForm(${JSON.stringify(p)})'>Edit</button>
                    <button class="btn-del" onclick="del('products',${p.id})">Delete</button>
                </td>
            </tr>`).join('')}
        </table>`;
}

async function loadCaches() {
    if (!categoriesCache.length) categoriesCache = await api('/api/categories');
    if (!suppliersCache.length) suppliersCache = await api('/api/suppliers');
}

function openProductForm(p) {
    loadCaches().then(() => {
        const edit = !!p;
        document.getElementById('formTitle').textContent = edit ? 'Edit Product' : 'New Product';
        document.getElementById('genericForm').innerHTML = `
            <label>SKU</label><input name="sku" value="${p?.sku||''}" required>
            <label>Name</label><input name="name" value="${p?.name||''}" required>
            <label>Price</label><input name="price" type="number" value="${p?.price||''}" required>
            <label>Category</label>
            <select name="category_id">${categoriesCache.map(c=>`<option value="${c.id}" ${p?.category_id==c.id?'selected':''}>${c.name}</option>`).join('')}</select>
            <label>Supplier</label>
            <select name="supplier_id">${suppliersCache.map(s=>`<option value="${s.id}" ${p?.supplier_id==s.id?'selected':''}>${s.name}</option>`).join('')}</select>
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="closeForm()">Cancel</button>
                <button type="submit" class="btn-save">${edit?'Update':'Create'}</button>
            </div>`;
        document.getElementById('genericForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = Object.fromEntries(new FormData(e.target));
            fd.price = parseFloat(fd.price); fd.category_id = parseInt(fd.category_id); fd.supplier_id = parseInt(fd.supplier_id);
            await api(edit ? `/api/products/${p.id}` : '/api/products', {
                method: edit ? 'PUT' : 'POST',
                headers: {'Content-Type':'application/json'}, body: JSON.stringify(fd)
            });
            closeForm(); loadSection();
        };
        document.getElementById('formOverlay').classList.add('show');
    });
}

// ─── Categories ─────────────────────────────
async function renderCategories(el) {
    const data = await api('/api/categories');
    categoriesCache = data;
    el.innerHTML = `
        <div class="section-title">Categories <span class="count-badge">${data.length}</span>
            <button class="btn-add" onclick="openSimpleForm('categories','Category',['name'])">+ Add</button>
        </div>
        <table>
            <tr><th>ID</th><th>Name</th><th></th></tr>
            ${data.map(c => `<tr>
                <td>${c.id}</td><td>${catBadge(c.name)}</td>
                <td>
                    <button class="btn-edit" onclick="openSimpleForm('categories','Category',['name'],${JSON.stringify(c).replace(/"/g,'&quot;')})">Edit</button>
                    <button class="btn-del" onclick="del('categories',${c.id})">Delete</button>
                </td>
            </tr>`).join('')}
        </table>`;
}

// ─── Suppliers ──────────────────────────────
async function renderSuppliers(el) {
    const data = await api('/api/suppliers');
    suppliersCache = data;
    el.innerHTML = `
        <div class="section-title">Suppliers <span class="count-badge">${data.length}</span>
            <button class="btn-add" onclick="openSimpleForm('suppliers','Supplier',['name','email'])">+ Add</button>
        </div>
        <table>
            <tr><th>ID</th><th>Name</th><th>Email</th><th></th></tr>
            ${data.map(s => `<tr>
                <td>${s.id}</td><td>${s.name}</td><td class="email">${s.email}</td>
                <td>
                    <button class="btn-edit" onclick="openSimpleForm('suppliers','Supplier',['name','email'],${JSON.stringify(s).replace(/"/g,'&quot;')})">Edit</button>
                    <button class="btn-del" onclick="del('suppliers',${s.id})">Delete</button>
                </td>
            </tr>`).join('')}
        </table>`;
}

// ─── Customers ──────────────────────────────
async function renderCustomers(el) {
    const data = await api('/api/customers');
    el.innerHTML = `
        <div class="section-title">Customers <span class="count-badge">${data.length}</span>
            <button class="btn-add" onclick="openSimpleForm('customers','Customer',['full_name','email','address','phone'])">+ Add</button>
        </div>
        <table>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>Address</th><th>Phone</th><th></th></tr>
            ${data.map(c => `<tr>
                <td>${c.id}</td><td>${c.full_name}</td><td class="email">${c.email}</td>
                <td>${c.address||'-'}</td><td>${c.phone||'-'}</td>
                <td>
                    <button class="btn-edit" onclick="openSimpleForm('customers','Customer',['full_name','email','address','phone'],${JSON.stringify(c).replace(/"/g,'&quot;')})">Edit</button>
                    <button class="btn-del" onclick="del('customers',${c.id})">Delete</button>
                </td>
            </tr>`).join('')}
        </table>`;
}

// ─── Generic form for simple entities ───────
function openSimpleForm(entity, label, fields, existing) {
    const edit = !!existing;
    document.getElementById('formTitle').textContent = edit ? `Edit ${label}` : `New ${label}`;
    document.getElementById('genericForm').innerHTML = `
        ${fields.map(f => `<label>${f}</label><input name="${f}" value="${existing?.[f]||''}" ${(f==='name'||f==='full_name'||f==='email')?'required':''}>`).join('')}
        <div class="form-actions">
            <button type="button" class="btn-cancel" onclick="closeForm()">Cancel</button>
            <button type="submit" class="btn-save">${edit?'Update':'Create'}</button>
        </div>`;
    document.getElementById('genericForm').onsubmit = async (e) => {
        e.preventDefault();
        const fd = Object.fromEntries(new FormData(e.target));
        await api(edit ? `/api/${entity}/${existing.id}` : `/api/${entity}`, {
            method: edit ? 'PUT' : 'POST',
            headers: {'Content-Type':'application/json'}, body: JSON.stringify(fd)
        });
        closeForm(); loadSection();
    };
    document.getElementById('formOverlay').classList.add('show');
}

// ─── Delete ─────────────────────────────────
async function del(entity, id) {
    if (!confirm('Are you sure you want to delete this record?')) return;
    await api(`/api/${entity}/${id}`, { method: 'DELETE' });
    loadSection();
}

function closeForm() { document.getElementById('formOverlay').classList.remove('show'); }

// Initial load
loadSection();
</script>
</body>
</html>
